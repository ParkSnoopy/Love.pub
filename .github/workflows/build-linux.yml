name: Build Linux

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rolling-linux
  cancel-in-progress: true

jobs:
  build-linux:
    name: Linux release bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsqlite3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore assets archive
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ASSET_ARCHIVE_URL="$(sed -n $'1{s/\r$//;p;}' .assets-uri)"
          test -n "${ASSET_ARCHIVE_URL}"
          curl -fL -H "Authorization: Bearer ${GITHUB_TOKEN}" "${ASSET_ARCHIVE_URL}" -o "${RUNNER_TEMP}/love-assets.zip"
          unzip -q -o "${RUNNER_TEMP}/love-assets.zip" -d .
          test -f assets/data.zip
          test -f assets/fonts/NotoSansCJK-VF.ttf.ttc
          test -f assets/fonts/NotoSerifCJK.ttc
          if [ ! -f assets/app_icon.png ]; then
            cp macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png assets/app_icon.png
          fi
          test -f assets/app_icon.png

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux artifact
        run: |
          tar -C build/linux/x64/release/bundle -czf love-linux-x64.tar.gz .
          sha256sum love-linux-x64.tar.gz > love-linux-x64.tar.gz.sha256

      - name: Set rolling tag
        if: github.ref == 'refs/heads/main'
        run: echo "ROLLING_TAG=rolling-$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Move rolling tag
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -f "${ROLLING_TAG}" "${GITHUB_SHA}"
          git push -f origin "${ROLLING_TAG}"

      - name: Upload to rolling release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.ROLLING_TAG }}
          name: Rolling Release ${{ env.ROLLING_TAG }}
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            love-linux-x64.tar.gz
            love-linux-x64.tar.gz.sha256

name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rolling-apk
  cancel-in-progress: true

jobs:
  build-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore assets archive
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ASSET_ARCHIVE_URL="$(sed -n $'1{s/\r$//;p;}' .assets-uri)"
          test -n "${ASSET_ARCHIVE_URL}"
          curl -fL -H "Authorization: Bearer ${GITHUB_TOKEN}" "${ASSET_ARCHIVE_URL}" -o "${RUNNER_TEMP}/love-assets.zip"
          unzip -q -o "${RUNNER_TEMP}/love-assets.zip" -d .
          test -f assets/data.zip
          test -f assets/fonts/NotoSansCJK-VF.ttf.ttc
          test -f assets/fonts/NotoSerifCJK.ttc
          if [ ! -f assets/app_icon.png ]; then
            cp macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png assets/app_icon.png
          fi
          test -f assets/app_icon.png

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Package APK artifact
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk love-android.apk
          sha256sum love-android.apk > love-android.apk.sha256

      - name: Set rolling tag
        if: github.ref == 'refs/heads/main'
        run: echo "ROLLING_TAG=rolling-$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Move rolling tag
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -f "${ROLLING_TAG}" "${GITHUB_SHA}"
          git push -f origin "${ROLLING_TAG}"

      - name: Upload to rolling release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.ROLLING_TAG }}
          name: Rolling Release ${{ env.ROLLING_TAG }}
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            love-android.apk
            love-android.apk.sha256

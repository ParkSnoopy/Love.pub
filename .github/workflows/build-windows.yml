name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rolling-windows
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows release bundle
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore assets archive
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $assetArchiveUrl = (Get-Content .assets-uri | Select-Object -First 1).Trim()
          if ([string]::IsNullOrWhiteSpace($assetArchiveUrl)) { throw 'Missing asset archive URL in .assets-uri' }
          $archivePath = Join-Path $env:RUNNER_TEMP 'love-assets.zip'
          Invoke-WebRequest -Uri $assetArchiveUrl -Headers @{ Authorization = "Bearer $env:GITHUB_TOKEN" } -OutFile $archivePath
          Expand-Archive -Path $archivePath -DestinationPath . -Force
          if (!(Test-Path 'assets/data.zip')) { throw 'Missing assets/data.zip' }
          if (!(Test-Path 'assets/fonts/NotoSansCJK-VF.ttf.ttc')) { throw 'Missing assets/fonts/NotoSansCJK-VF.ttf.ttc' }
          if (!(Test-Path 'assets/fonts/NotoSerifCJK.ttc')) { throw 'Missing assets/fonts/NotoSerifCJK.ttc' }
          if (!(Test-Path 'assets/app_icon.png')) { Copy-Item 'macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png' 'assets/app_icon.png' }
          if (!(Test-Path 'assets/app_icon.png')) { throw 'Missing assets/app_icon.png' }

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows artifact
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath love-windows-x64.zip -Force
          (Get-FileHash love-windows-x64.zip -Algorithm SHA256).Hash.ToLower() + "  love-windows-x64.zip" | Out-File -Encoding ascii love-windows-x64.zip.sha256

      - name: Set rolling tag
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: echo "ROLLING_TAG=rolling-$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Move rolling tag
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git tag -f "${ROLLING_TAG}" "${GITHUB_SHA}"
          git push -f origin "${ROLLING_TAG}"

      - name: Upload to rolling release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.ROLLING_TAG }}
          name: Rolling Release ${{ env.ROLLING_TAG }}
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            love-windows-x64.zip
            love-windows-x64.zip.sha256
